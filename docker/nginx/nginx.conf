server {
    listen 80;
    server_name _;

    # ------------------------------------------------------------------
    # Web principal de validacion del TFG
    # ------------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # ------------------------------------------------------------------
    # Prometheus - accesible mediante proxy inverso en /prometheus
    # ------------------------------------------------------------------
    location /prometheus {
        proxy_pass          http://172.30.30.10:9090;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # cAdvisor - accesible mediante proxy inverso en /metricas
    # ------------------------------------------------------------------
    location /metricas {
        proxy_pass          http://172.30.30.40:8080;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------------------------------------------------------------------
    # Uptime Kuma - NO se expone mediante sub-path en esta version.
    # Se mantiene accesible directamente en http://<IP_SERVIDOR>:3001
    # Motivo: Uptime Kuma presenta incompatibilidades con el montaje
    # bajo sub-path en Nginx en esta version del TFG.
    # ------------------------------------------------------------------
}
